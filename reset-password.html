<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إعادة تعيين كلمة المرور – نقابة عمال الراديو والكهرباء</title>
<style>
  :root{--navy:#283078;--gold:#CFA24E;--bg:#f5f5f8;--ink:#1c1b1f;--muted:#5c5c66}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink);
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;max-width:420px;width:100%;border-radius:18px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.1)}
  .head{background:var(--navy);color:#fff;padding:26px;text-align:center}
  .head .t{color:var(--gold);font-size:20px;font-weight:bold}
  .head .s{opacity:.85;font-size:13px;margin-top:4px}
  .body{padding:26px}
  h1{font-size:18px;color:var(--navy);margin:0 0 16px}
  label{display:block;font-size:14px;margin:14px 0 6px;color:var(--muted)}
  input{width:100%;padding:12px 14px;border:1px solid #d7d7e0;border-radius:10px;font-size:15px}
  button{width:100%;margin-top:20px;background:var(--navy);color:#fff;border:0;border-radius:30px;
         padding:14px;font-size:16px;font-weight:bold;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:16px;padding:12px;border-radius:10px;font-size:14px;display:none}
  .ok{background:#e7f6ec;color:#1c7a3e}
  .err{background:#fdecea;color:#b3261e}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="t">نقابة عمال الراديو والكهرباء</div>
    <div class="s">في لبنان الشمالي</div>
  </div>
  <div class="body">
    <h1>تعيين كلمة مرور جديدة</h1>
    <div id="form-area">
      <label for="p1">كلمة المرور الجديدة</label>
      <input id="p1" type="password" autocomplete="new-password" placeholder="٦ أحرف على الأقل">
      <label for="p2">تأكيد كلمة المرور</label>
      <input id="p2" type="password" autocomplete="new-password">
      <button id="btn" onclick="submit()">حفظ كلمة المرور</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>

<script>
  // إعدادات المشروع (المفتاح العام آمن للاستخدام هنا)
  var SUPABASE_URL = "https://ttgddrlnqfongmxwpvsy.supabase.co";
  var ANON_KEY = "sb_publishable_-tFjPM6VgX65uUxj1-AFLw_YMpuWzKM";

  var params = new URLSearchParams(window.location.hash.substring(1));
  var accessToken = params.get("access_token");
  var type = params.get("type");
  var errDesc = params.get("error_description");

  var msg = document.getElementById("msg");
  function show(text, cls){ msg.textContent = text; msg.className = "msg " + cls; msg.style.display = "block"; }

  if (errDesc) {
    document.getElementById("form-area").style.display = "none";
    show("انتهت صلاحية الرابط أو أنه غير صالح. اطلب رابطاً جديداً من التطبيق.", "err");
  } else if (!accessToken || type !== "recovery") {
    document.getElementById("form-area").style.display = "none";
    show("افتح هذه الصفحة من رابط إعادة التعيين في بريدك.", "err");
  }

  function submit(){
    var p1 = document.getElementById("p1").value;
    var p2 = document.getElementById("p2").value;
    if (p1.length < 6) { show("كلمة المرور ٦ أحرف على الأقل.", "err"); return; }
    if (p1 !== p2) { show("كلمتا المرور غير متطابقتين.", "err"); return; }
    var btn = document.getElementById("btn");
    btn.disabled = true; btn.textContent = "جارٍ الحفظ...";
    fetch(SUPABASE_URL + "/auth/v1/user", {
      method: "PUT",
      headers: {
        "apikey": ANON_KEY,
        "Authorization": "Bearer " + accessToken,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password: p1 })
    }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
      .then(function(res){
        if (res.ok) {
          document.getElementById("form-area").style.display = "none";
          show("تم تغيير كلمة المرور بنجاح. يمكنك الآن العودة إلى التطبيق وتسجيل الدخول.", "ok");
        } else {
          btn.disabled = false; btn.textContent = "حفظ كلمة المرور";
          show((res.d && (res.d.msg || res.d.error_description || res.d.message)) || "تعذّر تغيير كلمة المرور.", "err");
        }
      }).catch(function(){
        btn.disabled = false; btn.textContent = "حفظ كلمة المرور";
        show("تعذّر الاتصال. حاول مجدداً.", "err");
      });
  }
</script>
</body>
</html>
